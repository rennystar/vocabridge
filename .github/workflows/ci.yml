name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-2025-vs2026
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Frontend build
        run: npm run build

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Public build check
        run: cargo check --manifest-path src-tauri/Cargo.toml --no-default-features
